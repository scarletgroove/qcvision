[DETECTION_SETTINGS]
; Grayscale intensity below which a pixel is considered "dark" (0-255)
DARK_THRESHOLD = 50
; Grayscale intensity above which a pixel is considered "bright" (0-255)
BRIGHT_THRESHOLD = 200
; Minimum contour area (pixels) to count as a defect
MIN_DEFECT_AREA = 20
; Maximum contour area (pixels) — larger regions are treated as background variation
MAX_DEFECT_AREA = 5000
; Minimum confidence score (0.0-1.0) required to log a detection
CONFIDENCE_THRESHOLD = 0.5
; Minimum seconds between logging the same defect type (prevents duplicate entries)
LOG_COOLDOWN_SEC = 1.0

[PLC_SETTINGS]
PLC_IP = 192.168.1.10
PLC_PORT = 502
PLC_DEFECT_REGISTER = 1
PLC_ACK_REGISTER = 2
